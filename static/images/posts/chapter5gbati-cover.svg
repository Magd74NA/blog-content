<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="50%" stop-color="#0f1628"/>
      <stop offset="100%" stop-color="#0a1020"/>
    </linearGradient>
    <linearGradient id="chipGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2744"/>
      <stop offset="100%" stop-color="#0d1a30"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00d4aa"/>
      <stop offset="100%" stop-color="#0099cc"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00d4aa" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00d4aa" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="chipClip">
      <rect x="820" y="165" width="200" height="260" rx="6"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#00d4aa" stroke-width="0.5">
    <line x1="0" y1="0" x2="0" y2="630"/><line x1="40" y1="0" x2="40" y2="630"/>
    <line x1="80" y1="0" x2="80" y2="630"/><line x1="120" y1="0" x2="120" y2="630"/>
    <line x1="160" y1="0" x2="160" y2="630"/><line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/><line x1="280" y1="0" x2="280" y2="630"/>
    <line x1="320" y1="0" x2="320" y2="630"/><line x1="360" y1="0" x2="360" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/><line x1="440" y1="0" x2="440" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/><line x1="520" y1="0" x2="520" y2="630"/>
    <line x1="560" y1="0" x2="560" y2="630"/><line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="640" y1="0" x2="640" y2="630"/><line x1="640" y1="0" x2="640" y2="630"/>
    <line x1="680" y1="0" x2="680" y2="630"/><line x1="720" y1="0" x2="720" y2="630"/>
    <line x1="760" y1="0" x2="760" y2="630"/><line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="840" y1="0" x2="840" y2="630"/><line x1="880" y1="0" x2="880" y2="630"/>
    <line x1="920" y1="0" x2="920" y2="630"/><line x1="960" y1="0" x2="960" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/><line x1="1040" y1="0" x2="1040" y2="630"/>
    <line x1="1080" y1="0" x2="1080" y2="630"/><line x1="1120" y1="0" x2="1120" y2="630"/>
    <line x1="1160" y1="0" x2="1160" y2="630"/><line x1="1200" y1="0" x2="1200" y2="630"/>
    <line x1="0" y1="0" x2="1200" y2="0"/><line x1="0" y1="40" x2="1200" y2="40"/>
    <line x1="0" y1="80" x2="1200" y2="80"/><line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="160" x2="1200" y2="160"/><line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="240" x2="1200" y2="240"/><line x1="0" y1="280" x2="1200" y2="280"/>
    <line x1="0" y1="320" x2="1200" y2="320"/><line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="400" x2="1200" y2="400"/><line x1="0" y1="440" x2="1200" y2="440"/>
    <line x1="0" y1="480" x2="1200" y2="480"/><line x1="0" y1="520" x2="1200" y2="520"/>
    <line x1="0" y1="560" x2="1200" y2="560"/><line x1="0" y1="600" x2="1200" y2="600"/>
  </g>

  <!-- Circuit trace decorations - left side -->
  <g stroke="#00d4aa" stroke-width="1.5" fill="none" opacity="0.12">
    <path d="M0,200 H60 V280 H120 V200 H180"/>
    <path d="M0,350 H40 V420 H100 V350 H160 V420"/>
    <path d="M0,500 H80 V450 H140"/>
    <circle cx="60" cy="200" r="3" fill="#00d4aa"/>
    <circle cx="120" cy="280" r="3" fill="#00d4aa"/>
    <circle cx="180" cy="200" r="3" fill="#00d4aa"/>
    <circle cx="40" cy="350" r="3" fill="#00d4aa"/>
    <circle cx="100" cy="420" r="3" fill="#00d4aa"/>
    <circle cx="80" cy="500" r="3" fill="#00d4aa"/>
  </g>

  <!-- Circuit trace decorations - bottom -->
  <g stroke="#0099cc" stroke-width="1" fill="none" opacity="0.08">
    <path d="M200,630 V580 H300 V530 H400 V580 H500"/>
    <path d="M600,630 V560 H700 V510 H800"/>
    <circle cx="300" cy="580" r="2.5" fill="#0099cc"/>
    <circle cx="500" cy="580" r="2.5" fill="#0099cc"/>
    <circle cx="700" cy="560" r="2.5" fill="#0099cc"/>
  </g>

  <!-- Ambient glow behind chip -->
  <ellipse cx="920" cy="295" rx="160" ry="180" fill="url(#glowGrad)" opacity="0.5"/>

  <!-- STM32 Chip Body -->
  <rect x="820" y="165" width="200" height="260" rx="6" fill="url(#chipGrad)" stroke="#2a4060" stroke-width="2"/>
  <!-- Chip notch -->
  <circle cx="920" cy="175" r="8" fill="none" stroke="#2a4060" stroke-width="1.5"/>
  <!-- Chip label -->
  <text x="920" y="280" text-anchor="middle" font-family="monospace, system-ui, sans-serif" font-size="16" font-weight="bold" fill="#5a8aaa" letter-spacing="3">STM32</text>
  <text x="920" y="302" text-anchor="middle" font-family="monospace, system-ui, sans-serif" font-size="12" fill="#3a6a8a" letter-spacing="2">F446</text>
  <text x="920" y="325" text-anchor="middle" font-family="monospace, system-ui, sans-serif" font-size="8" fill="#2a4a6a" letter-spacing="1">Cortex-M4</text>

  <!-- Chip pins - top -->
  <g fill="#3a5a7a">
    <rect x="850" y="148" width="8" height="20" rx="1"/>
    <rect x="870" y="148" width="8" height="20" rx="1"/>
    <rect x="890" y="148" width="8" height="20" rx="1"/>
    <rect x="910" y="148" width="8" height="20" rx="1"/>
    <rect x="930" y="148" width="8" height="20" rx="1"/>
    <rect x="950" y="148" width="8" height="20" rx="1"/>
    <rect x="970" y="148" width="8" height="20" rx="1"/>
    <rect x="990" y="148" width="8" height="20" rx="1"/>
  </g>
  <!-- Chip pins - bottom -->
  <g fill="#3a5a7a">
    <rect x="850" y="422" width="8" height="20" rx="1"/>
    <rect x="870" y="422" width="8" height="20" rx="1"/>
    <rect x="890" y="422" width="8" height="20" rx="1"/>
    <rect x="910" y="422" width="8" height="20" rx="1"/>
    <rect x="930" y="422" width="8" height="20" rx="1"/>
    <rect x="950" y="422" width="8" height="20" rx="1"/>
    <rect x="970" y="422" width="8" height="20" rx="1"/>
    <rect x="990" y="422" width="8" height="20" rx="1"/>
  </g>
  <!-- Chip pins - left -->
  <g fill="#3a5a7a">
    <rect x="803" y="195" width="20" height="8" rx="1"/>
    <rect x="803" y="220" width="20" height="8" rx="1"/>
    <rect x="803" y="245" width="20" height="8" rx="1"/>
    <rect x="803" y="270" width="20" height="8" rx="1"/>
    <rect x="803" y="295" width="20" height="8" rx="1"/>
    <rect x="803" y="320" width="20" height="8" rx="1"/>
    <rect x="803" y="345" width="20" height="8" rx="1"/>
    <rect x="803" y="370" width="20" height="8" rx="1"/>
  </g>
  <!-- Chip pins - right -->
  <g fill="#3a5a7a">
    <rect x="1017" y="195" width="20" height="8" rx="1"/>
    <rect x="1017" y="220" width="20" height="8" rx="1"/>
    <rect x="1017" y="245" width="20" height="8" rx="1"/>
    <rect x="1017" y="270" width="20" height="8" rx="1"/>
    <rect x="1017" y="295" width="20" height="8" rx="1"/>
    <rect x="1017" y="320" width="20" height="8" rx="1"/>
    <rect x="1017" y="345" width="20" height="8" rx="1"/>
    <rect x="1017" y="370" width="20" height="8" rx="1"/>
  </g>

  <!-- Circuit traces from chip pins -->
  <g stroke="#00d4aa" stroke-width="1" fill="none" opacity="0.2">
    <path d="M1037,224 H1080 V180 H1120"/>
    <path d="M1037,249 H1060 V140 H1120"/>
    <path d="M1037,274 H1090 V290 H1140"/>
    <path d="M1037,299 H1070 V360 H1130"/>
    <path d="M1037,349 H1080 V420 H1140"/>
    <path d="M1037,374 H1060 V460 H1120"/>
    <path d="M803,274 H760 V250 H700"/>
    <path d="M803,299 H750 V330 H700"/>
    <path d="M803,349 H760 V390 H700"/>
    <circle cx="1120" cy="180" r="2.5" fill="#00d4aa"/>
    <circle cx="1120" cy="140" r="2.5" fill="#00d4aa"/>
    <circle cx="1140" cy="290" r="2.5" fill="#00d4aa"/>
    <circle cx="1130" cy="360" r="2.5" fill="#00d4aa"/>
    <circle cx="1140" cy="420" r="2.5" fill="#00d4aa"/>
    <circle cx="1120" cy="460" r="2.5" fill="#00d4aa"/>
    <circle cx="700" cy="250" r="2.5" fill="#00d4aa"/>
    <circle cx="700" cy="330" r="2.5" fill="#00d4aa"/>
    <circle cx="700" cy="390" r="2.5" fill="#00d4aa"/>
  </g>

  <!-- Makefile rule visual - dependency tree -->
  <g transform="translate(620, 60)">
    <!-- Connection lines -->
    <g stroke="#00d4aa" stroke-width="1" opacity="0.25">
      <line x1="80" y1="32" x2="40" y2="72"/>
      <line x1="80" y1="32" x2="120" y2="72"/>
      <line x1="40" y1="90" x2="40" y2="120"/>
      <line x1="120" y1="90" x2="120" y2="120"/>
    </g>
    <!-- Root node: .elf -->
    <rect x="50" y="14" width="60" height="22" rx="4" fill="none" stroke="#00d4aa" stroke-width="1.2" opacity="0.6"/>
    <text x="80" y="30" text-anchor="middle" font-family="monospace, system-ui, sans-serif" font-size="10" fill="#00d4aa" opacity="0.8">.elf</text>
    <!-- .o nodes -->
    <rect x="12" y="70" width="56" height="22" rx="4" fill="none" stroke="#0099cc" stroke-width="1" opacity="0.5"/>
    <text x="40" y="86" text-anchor="middle" font-family="monospace, system-ui, sans-serif" font-size="9" fill="#0099cc" opacity="0.7">main.o</text>
    <rect x="86" y="70" width="68" height="22" rx="4" fill="none" stroke="#0099cc" stroke-width="1" opacity="0.5"/>
    <text x="120" y="86" text-anchor="middle" font-family="monospace, system-ui, sans-serif" font-size="8" fill="#0099cc" opacity="0.7">startup.o</text>
    <!-- .c source nodes -->
    <rect x="4" y="118" width="72" height="22" rx="4" fill="none" stroke="#3a6a8a" stroke-width="0.8" opacity="0.4"/>
    <text x="40" y="134" text-anchor="middle" font-family="monospace, system-ui, sans-serif" font-size="9" fill="#3a6a8a" opacity="0.6">main.c</text>
    <rect x="80" y="118" width="80" height="22" rx="4" fill="none" stroke="#3a6a8a" stroke-width="0.8" opacity="0.4"/>
    <text x="120" y="134" text-anchor="middle" font-family="monospace, system-ui, sans-serif" font-size="7" fill="#3a6a8a" opacity="0.6">startup.c</text>
  </g>

  <!-- Makefile code snippet decoration -->
  <g transform="translate(720, 460)" opacity="0.35">
    <text font-family="monospace, system-ui, sans-serif" font-size="10" fill="#5a8aaa">
      <tspan x="0" dy="0">main.o : main.c</tspan>
      <tspan x="0" dy="16">  $(CC) -c $^ -o $@</tspan>
    </text>
  </g>

  <!-- Accent line -->
  <rect x="60" y="180" width="4" height="80" rx="2" fill="url(#accentGrad)"/>

  <!-- Title text -->
  <text x="80" y="230" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="800" fill="#e8ecf2" letter-spacing="-0.5">
    Building a Custom
  </text>
  <text x="80" y="282" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="800" fill="#e8ecf2" letter-spacing="-0.5">
    Makefile for STM32
  </text>
  <text x="80" y="334" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="800" fill="#e8ecf2" letter-spacing="-0.5">
    Bare-Metal Dev
  </text>

  <!-- Subtitle / accent text -->
  <text x="80" y="380" font-family="monospace, system-ui, sans-serif" font-size="15" fill="#00d4aa" opacity="0.8" letter-spacing="1">
    target : prerequisite → recipe
  </text>

  <!-- Tags -->
  <g transform="translate(80, 420)">
    <rect x="0" y="0" width="72" height="24" rx="12" fill="#00d4aa" opacity="0.12" stroke="#00d4aa" stroke-width="0.8" stroke-opacity="0.3"/>
    <text x="36" y="16" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#00d4aa" font-weight="600">STM32</text>

    <rect x="82" y="0" width="80" height="24" rx="12" fill="#0099cc" opacity="0.12" stroke="#0099cc" stroke-width="0.8" stroke-opacity="0.3"/>
    <text x="122" y="16" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#0099cc" font-weight="600">Makefile</text>

    <rect x="172" y="0" width="72" height="24" rx="12" fill="#ff6b6b" opacity="0.1" stroke="#ff6b6b" stroke-width="0.8" stroke-opacity="0.25"/>
    <text x="208" y="16" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#ff6b6b" font-weight="600">Bare C</text>

    <rect x="254" y="0" width="90" height="24" rx="12" fill="#ffd93d" opacity="0.1" stroke="#ffd93d" stroke-width="0.8" stroke-opacity="0.2"/>
    <text x="299" y="16" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#ffd93d" font-weight="600">Cortex-M4</text>
  </g>

  <!-- Terminal prompt decoration -->
  <g transform="translate(80, 490)" opacity="0.5">
    <text font-family="monospace, system-ui, sans-serif" font-size="13" fill="#00d4aa">$ make final</text>
    <text y="20" font-family="monospace, system-ui, sans-serif" font-size="13" fill="#5a8aaa">arm-none-eabi-gcc -mcpu=cortex-m4 -mthumb ...</text>
  </g>

  <!-- Make reserved keyword warning decoration -->
  <g transform="translate(720, 510)" opacity="0.3">
    <text font-family="monospace, system-ui, sans-serif" font-size="9" fill="#ff6b6b">
      <tspan x="0" dy="0">⚠ "load" is reserved in Make 4.0+</tspan>
      <tspan x="0" dy="14">  Use "flash" instead</tspan>
    </text>
  </g>

  <!-- Bottom accent bar -->
  <rect x="0" y="624" width="1200" height="6" fill="url(#accentGrad)" opacity="0.6"/>

  <!-- Top-right binary decoration -->
  <g transform="translate(1060, 30)" opacity="0.08" font-family="monospace, system-ui, sans-serif" font-size="9" fill="#00d4aa">
    <text x="0" y="0">0b10110</text>
    <text x="0" y="14">0xFF446</text>
    <text x="0" y="28">0b11001</text>
    <text x="0" y="42">0x4002</text>
  </g>

  <!-- Decorative dots pattern - top left -->
  <g opacity="0.06" fill="#00d4aa">
    <circle cx="30" cy="30" r="2"/><circle cx="50" cy="30" r="2"/><circle cx="70" cy="30" r="2"/>
    <circle cx="30" cy="50" r="2"/><circle cx="50" cy="50" r="2"/><circle cx="70" cy="50" r="2"/>
    <circle cx="30" cy="70" r="2"/><circle cx="50" cy="70" r="2"/><circle cx="70" cy="70" r="2"/>
  </g>
</svg>