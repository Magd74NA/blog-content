<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#0d1a28"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00d4aa"/>
      <stop offset="100%" stop-color="#0099cc"/>
    </linearGradient>
    <linearGradient id="panelGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f1f35"/>
      <stop offset="100%" stop-color="#0a1525"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid lines -->
  <g stroke="#00d4aa" stroke-width="0.5" opacity="0.05">
    <line x1="0" y1="157" x2="1200" y2="157"/>
    <line x1="0" y1="314" x2="1200" y2="314"/>
    <line x1="0" y1="471" x2="1200" y2="471"/>
  </g>

  <!-- Left column: title -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
    <!-- Eyebrow -->
    <text x="72" y="196" font-size="22" fill="#4a6a7a" letter-spacing="2">CROSS-COMPILATION TOOLCHAIN</text>
    <!-- Title -->
    <text x="72" y="280" font-size="70" font-weight="700" fill="#e8ecf2">CMake +</text>
    <text x="72" y="358" font-size="70" font-weight="700" fill="#e8ecf2">CLion on</text>
    <text x="72" y="436" font-size="70" font-weight="700" fill="url(#accent)">STM32F446</text>
    <!-- Tagline -->
    <text x="72" y="488" font-size="16" fill="#5a8a9a">One-click build and flash for bare-metal C</text>
  </g>

  <!-- Accent bar -->
  <rect x="72" y="503" width="260" height="3" rx="2" fill="url(#accent)"/>

  <!-- Right side: terminal / build output panel -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
    <!-- Panel background -->
    <rect x="640" y="80" width="500" height="480" rx="8" fill="url(#panelGrad)" stroke="#1a3050" stroke-width="1"/>

    <!-- Title bar dots -->
    <circle cx="664" cy="100" r="5" fill="#ff5f57" opacity="0.7"/>
    <circle cx="682" cy="100" r="5" fill="#febc2e" opacity="0.7"/>
    <circle cx="700" cy="100" r="5" fill="#28c840" opacity="0.7"/>

    <!-- Tab label -->
    <text x="720" y="104" font-size="12" fill="#4a6a8a">Build</text>

    <!-- Build output lines -->
    <text font-size="13">
      <tspan x="660" y="136" fill="#5a8aaa">[cmake]</tspan>
      <tspan fill="#6a8a9a"> -- Cross-compiling for ARM</tspan>
    </text>
    <text font-size="13">
      <tspan x="660" y="158" fill="#5a8aaa">[cmake]</tspan>
      <tspan fill="#6a8a9a"> -- Toolchain: arm-none-eabi-gcc</tspan>
    </text>
    <text font-size="13">
      <tspan x="660" y="180" fill="#5a8aaa">[cmake]</tspan>
      <tspan fill="#6a8a9a"> -- MCU flags: -mcpu=cortex-m4</tspan>
    </text>

    <!-- Separator -->
    <line x1="660" y1="196" x2="1120" y2="196" stroke="#1a3050" stroke-width="1"/>

    <!-- Build steps -->
    <text x="660" y="220" font-size="13" fill="#00d4aa">▸ Building C object CMakeFiles/stm32.dir/src/main.c.o</text>
    <text x="660" y="244" font-size="13" fill="#00d4aa">▸ Building C object CMakeFiles/stm32.dir/src/startup.c.o</text>
    <text x="660" y="268" font-size="13" fill="#00d4aa">▸ Linking C executable stm32.elf</text>

    <!-- Size output -->
    <line x1="660" y1="288" x2="1120" y2="288" stroke="#1a3050" stroke-width="1"/>
    <text font-size="13" fill="#5a8aaa">
      <tspan x="660" y="312">   text    data     bss     dec</tspan>
      <tspan x="660" y="332" fill="#6a8a9a">    244       0       0     244</tspan>
    </text>

    <!-- Hex generation -->
    <line x1="660" y1="352" x2="1120" y2="352" stroke="#1a3050" stroke-width="1"/>
    <text x="660" y="376" font-size="13" fill="#5a8aaa">arm-none-eabi-objcopy -O ihex stm32.elf stm32.hex</text>
    <text x="660" y="396" font-size="13" fill="#5a8aaa">arm-none-eabi-objcopy -O binary stm32.elf stm32.bin</text>

    <!-- Flash section -->
    <line x1="660" y1="416" x2="1120" y2="416" stroke="#1a3050" stroke-width="1"/>
    <text x="660" y="440" font-size="13" fill="#febc2e" opacity="0.8">▸ Flashing via OpenOCD...</text>
    <text font-size="12">
      <tspan x="660" y="462" fill="#4a6a7a">  Info : stm32f4x.cpu: Cortex-M4 r0p1</tspan>
      <tspan x="660" y="480" fill="#4a6a7a">  ** Programming Started **</tspan>
      <tspan x="660" y="498" fill="#4a6a7a">  ** Programming Finished **</tspan>
      <tspan x="660" y="516" fill="#4a6a7a">  ** Verify Started **</tspan>
      <tspan x="660" y="534" fill="#28c840" opacity="0.8">  ** Verified OK **</tspan>
    </text>

    <!-- Build success indicator -->
    <text x="660" y="554" font-size="14" fill="#28c840" font-weight="600">✓ Build and flash succeeded</text>
  </g>
</svg>
