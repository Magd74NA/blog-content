<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#0d1a28"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00d4aa"/>
      <stop offset="100%" stop-color="#0099cc"/>
    </linearGradient>
    <linearGradient id="b1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00d4aa" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#00d4aa" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="b2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0099cc" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#0099cc" stop-opacity="0.04"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid lines -->
  <g stroke="#00d4aa" stroke-width="0.5" opacity="0.05">
    <line x1="0" y1="157" x2="1200" y2="157"/>
    <line x1="0" y1="314" x2="1200" y2="314"/>
    <line x1="0" y1="471" x2="1200" y2="471"/>
  </g>

  <!-- Left: title -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
    <text x="72" y="196" font-size="22" fill="#4a6a7a" letter-spacing="2">ARM CMSIS STANDARD</text>
    <text x="72" y="280" font-size="70" font-weight="700" fill="#e8ecf2">Memory-</text>
    <text x="72" y="358" font-size="70" font-weight="700" fill="#e8ecf2">Mapped</text>
    <text x="72" y="436" font-size="70" font-weight="700" fill="url(#accent)">Hardware</text>
    <text x="72" y="488" font-size="16" fill="#5a8a9a">Structs overlaid on peripheral registers</text>
  </g>

  <rect x="72" y="503" width="260" height="3" rx="2" fill="url(#accent)"/>

  <!-- Right: struct memory map -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
    <text x="740" y="118" font-size="13" fill="#3a6a7a" letter-spacing="1">GPIO_TypeDef  @  0x40020000</text>

    <!-- Base address indicator -->
    <circle cx="708" cy="157" r="3.5" fill="none" stroke="#00d4aa" stroke-width="1.2" opacity="0.5"/>
    <line x1="712" y1="157" x2="720" y2="157" stroke="#00d4aa" stroke-width="1" opacity="0.4"/>

    <!-- Register rows -->
    <rect x="720" y="140" width="400" height="36" rx="3" fill="url(#b1)" stroke="#00d4aa" stroke-width="0.6" stroke-opacity="0.25"/>
    <text x="736" y="163" font-size="13" fill="#00d4aa" font-weight="600">MODER</text>
    <text x="1084" y="163" font-size="12" fill="#2a5a6a" text-anchor="end">+0x00</text>

    <rect x="720" y="184" width="400" height="36" rx="3" fill="url(#b2)" stroke="#0099cc" stroke-width="0.6" stroke-opacity="0.2"/>
    <text x="736" y="207" font-size="13" fill="#3a8aaa" font-weight="600">OTYPER</text>
    <text x="1084" y="207" font-size="12" fill="#2a5a6a" text-anchor="end">+0x04</text>

    <rect x="720" y="228" width="400" height="36" rx="3" fill="url(#b1)" stroke="#00d4aa" stroke-width="0.6" stroke-opacity="0.25"/>
    <text x="736" y="251" font-size="13" fill="#00d4aa" font-weight="600">OSPEEDR</text>
    <text x="1084" y="251" font-size="12" fill="#2a5a6a" text-anchor="end">+0x08</text>

    <rect x="720" y="272" width="400" height="36" rx="3" fill="url(#b2)" stroke="#0099cc" stroke-width="0.6" stroke-opacity="0.2"/>
    <text x="736" y="295" font-size="13" fill="#3a8aaa" font-weight="600">PUPDR</text>
    <text x="1084" y="295" font-size="12" fill="#2a5a6a" text-anchor="end">+0x0C</text>

    <rect x="720" y="316" width="400" height="36" rx="3" fill="url(#b1)" stroke="#00d4aa" stroke-width="0.6" stroke-opacity="0.25"/>
    <text x="736" y="339" font-size="13" fill="#00d4aa" font-weight="600">IDR</text>
    <text x="1084" y="339" font-size="12" fill="#2a5a6a" text-anchor="end">+0x10</text>

    <rect x="720" y="360" width="400" height="36" rx="3" fill="url(#b2)" stroke="#0099cc" stroke-width="0.6" stroke-opacity="0.2"/>
    <text x="736" y="383" font-size="13" fill="#3a8aaa" font-weight="600">ODR</text>
    <text x="1084" y="383" font-size="12" fill="#2a5a6a" text-anchor="end">+0x14</text>

    <rect x="720" y="404" width="400" height="36" rx="3" fill="url(#b1)" stroke="#00d4aa" stroke-width="0.6" stroke-opacity="0.25"/>
    <text x="736" y="427" font-size="13" fill="#00d4aa" font-weight="600">BSRR</text>
    <text x="1084" y="427" font-size="12" fill="#2a5a6a" text-anchor="end">+0x18</text>

    <rect x="720" y="448" width="400" height="36" rx="3" fill="url(#b2)" stroke="#0099cc" stroke-width="0.6" stroke-opacity="0.2"/>
    <text x="736" y="471" font-size="13" fill="#3a8aaa" font-weight="600">LCKR</text>
    <text x="1084" y="471" font-size="12" fill="#2a5a6a" text-anchor="end">+0x1C</text>

    <rect x="720" y="492" width="400" height="36" rx="3" fill="url(#b1)" stroke="#00d4aa" stroke-width="0.6" stroke-opacity="0.25"/>
    <text x="736" y="515" font-size="13" fill="#00d4aa" font-weight="600">AFRL</text>
    <text x="1084" y="515" font-size="12" fill="#2a5a6a" text-anchor="end">+0x20</text>

    <rect x="720" y="536" width="400" height="36" rx="3" fill="url(#b2)" stroke="#0099cc" stroke-width="0.6" stroke-opacity="0.2"/>
    <text x="736" y="559" font-size="13" fill="#3a8aaa" font-weight="600">AFRH</text>
    <text x="1084" y="559" font-size="12" fill="#2a5a6a" text-anchor="end">+0x24</text>

    <!-- Size bracket -->
    <line x1="1130" y1="145" x2="1130" y2="572" stroke="#2a4a5a" stroke-width="0.8"/>
    <line x1="1126" y1="145" x2="1134" y2="145" stroke="#2a4a5a" stroke-width="0.8"/>
    <line x1="1126" y1="572" x2="1134" y2="572" stroke="#2a4a5a" stroke-width="0.8"/>
    <text x="1140" y="362" font-size="11" fill="#2a4a5a" transform="rotate(90 1140 362)">0x28 bytes (40)</text>
  </g>
</svg>
