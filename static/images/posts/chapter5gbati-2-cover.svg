<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="50%" stop-color="#0f1729"/>
      <stop offset="100%" stop-color="#0a1020"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#0077b6"/>
    </linearGradient>
    <linearGradient id="chipGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a2744"/>
      <stop offset="100%" stop-color="#0d1a30"/>
    </linearGradient>
    <linearGradient id="regHighlight" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="glowLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00e5ff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="gridPattern" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a2a4a" stroke-width="0.5" opacity="0.4"/>
    </pattern>
    <pattern id="dotPattern" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="0.5" fill="#2a4a6a" opacity="0.3"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <rect width="1200" height="630" fill="url(#gridPattern)"/>
  <rect width="1200" height="630" fill="url(#dotPattern)"/>

  <!-- Ambient glow circles -->
  <circle cx="200" cy="400" r="200" fill="#00e5ff" opacity="0.03" filter="url(#softGlow)"/>
  <circle cx="900" cy="200" r="250" fill="#00e5ff" opacity="0.02" filter="url(#softGlow)"/>
  <circle cx="1050" cy="500" r="150" fill="#0077b6" opacity="0.04" filter="url(#softGlow)"/>

  <!-- STM32 Chip representation -->
  <g transform="translate(80, 180)">
    <!-- Chip body -->
    <rect x="0" y="0" width="140" height="170" rx="4" fill="url(#chipGrad)" stroke="#2a4a6a" stroke-width="1.5"/>
    <!-- Chip notch -->
    <circle cx="70" cy="12" r="6" fill="none" stroke="#2a4a6a" stroke-width="1"/>
    <!-- Chip label -->
    <text x="70" y="75" text-anchor="middle" font-family="monospace" font-size="11" fill="#4a7a9a" font-weight="bold">STM32</text>
    <text x="70" y="92" text-anchor="middle" font-family="monospace" font-size="9" fill="#3a6a8a">F446RE</text>
    <text x="70" y="115" text-anchor="middle" font-family="monospace" font-size="7" fill="#2a5a7a">ARM Cortex-M4</text>

    <!-- Left pins -->
    <g fill="#3a6a8a">
      <rect x="-18" y="20" width="18" height="4" rx="1"/>
      <rect x="-18" y="35" width="18" height="4" rx="1"/>
      <rect x="-18" y="50" width="18" height="4" rx="1"/>
      <rect x="-18" y="65" width="18" height="4" rx="1"/>
      <rect x="-18" y="80" width="18" height="4" rx="1"/>
      <rect x="-18" y="95" width="18" height="4" rx="1"/>
      <rect x="-18" y="110" width="18" height="4" rx="1"/>
      <rect x="-18" y="125" width="18" height="4" rx="1"/>
      <rect x="-18" y="140" width="18" height="4" rx="1"/>
    </g>
    <!-- Right pins -->
    <g fill="#3a6a8a">
      <rect x="140" y="20" width="18" height="4" rx="1"/>
      <rect x="140" y="35" width="18" height="4" rx="1"/>
      <rect x="140" y="50" width="18" height="4" rx="1"/>
      <rect x="140" y="65" width="18" height="4" rx="1"/>
      <rect x="140" y="80" width="18" height="4" rx="1"/>
      <rect x="140" y="95" width="18" height="4" rx="1"/>
      <rect x="140" y="110" width="18" height="4" rx="1"/>
      <rect x="140" y="125" width="18" height="4" rx="1"/>
      <rect x="140" y="140" width="18" height="4" rx="1"/>
    </g>
    <!-- Top pins -->
    <g fill="#3a6a8a">
      <rect x="20" y="-18" width="4" height="18" rx="1"/>
      <rect x="35" y="-18" width="4" height="18" rx="1"/>
      <rect x="50" y="-18" width="4" height="18" rx="1"/>
      <rect x="90" y="-18" width="4" height="18" rx="1"/>
      <rect x="105" y="-18" width="4" height="18" rx="1"/>
      <rect x="120" y="-18" width="4" height="18" rx="1"/>
    </g>
    <!-- Bottom pins -->
    <g fill="#3a6a8a">
      <rect x="20" y="170" width="4" height="18" rx="1"/>
      <rect x="35" y="170" width="4" height="18" rx="1"/>
      <rect x="50" y="170" width="4" height="18" rx="1"/>
      <rect x="90" y="170" width="4" height="18" rx="1"/>
      <rect x="105" y="170" width="4" height="18" rx="1"/>
      <rect x="120" y="170" width="4" height="18" rx="1"/>
    </g>
  </g>

  <!-- Circuit traces from chip -->
  <g stroke="#1a4a6a" stroke-width="1.5" fill="none" opacity="0.6">
    <path d="M 220 250 L 280 250 L 300 230 L 350 230"/>
    <path d="M 220 265 L 260 265 L 280 285 L 350 285"/>
    <path d="M 220 280 L 250 280 L 270 340 L 350 340"/>
    <path d="M 220 220 L 260 220 L 290 175 L 350 175"/>
  </g>

  <!-- Connection dots -->
  <g fill="#00e5ff" filter="url(#glow)" opacity="0.8">
    <circle cx="350" cy="175" r="3"/>
    <circle cx="350" cy="230" r="3"/>
    <circle cx="350" cy="285" r="3"/>
    <circle cx="350" cy="340" r="3"/>
  </g>

  <!-- Memory-mapped register visualization -->
  <g transform="translate(370, 140)">
    <!-- Section label -->
    <text x="0" y="0" font-family="monospace" font-size="10" fill="#00e5ff" opacity="0.7">GPIO_TypeDef</text>
    <text x="0" y="14" font-family="monospace" font-size="8" fill="#4a7a9a">@ 0x40020000</text>

    <!-- Register blocks -->
    <g transform="translate(0, 25)">
      <!-- MODER -->
      <rect x="0" y="0" width="180" height="28" rx="2" fill="url(#regHighlight)" stroke="#1a4a6a" stroke-width="0.5"/>
      <text x="8" y="18" font-family="monospace" font-size="10" fill="#00e5ff">MODER</text>
      <text x="140" y="18" font-family="monospace" font-size="9" fill="#4a7a9a" text-anchor="end">0x00</text>

      <!-- OTYPER -->
      <rect x="0" y="32" width="180" height="28" rx="2" fill="#0d1a30" stroke="#1a4a6a" stroke-width="0.5"/>
      <text x="8" y="50" font-family="monospace" font-size="10" fill="#6a9ab8">OTYPER</text>
      <text x="140" y="50" font-family="monospace" font-size="9" fill="#4a7a9a" text-anchor="end">0x04</text>

      <!-- OSPEEDR -->
      <rect x="0" y="64" width="180" height="28" rx="2" fill="#0d1a30" stroke="#1a4a6a" stroke-width="0.5"/>
      <text x="8" y="82" font-family="monospace" font-size="10" fill="#6a9ab8">OSPEEDR</text>
      <text x="140" y="82" font-family="monospace" font-size="9" fill="#4a7a9a" text-anchor="end">0x08</text>

      <!-- PUPDR -->
      <rect x="0" y="96" width="180" height="28" rx="2" fill="#0d1a30" stroke="#1a4a6a" stroke-width="0.5"/>
      <text x="8" y="114" font-family="monospace" font-size="10" fill="#6a9ab8">PUPDR</text>
      <text x="140" y="114" font-family="monospace" font-size="9" fill="#4a7a9a" text-anchor="end">0x0C</text>

      <!-- IDR -->
      <rect x="0" y="128" width="180" height="28" rx="2" fill="#0d1a30" stroke="#1a4a6a" stroke-width="0.5"/>
      <text x="8" y="146" font-family="monospace" font-size="10" fill="#6a9ab8">IDR</text>
      <text x="140" y="146" font-family="monospace" font-size="9" fill="#4a7a9a" text-anchor="end">0x10</text>

      <!-- ODR - highlighted -->
      <rect x="0" y="160" width="180" height="28" rx="2" fill="url(#regHighlight)" stroke="#00e5ff" stroke-width="0.8" opacity="0.9"/>
      <text x="8" y="178" font-family="monospace" font-size="10" fill="#00e5ff" filter="url(#glow)">ODR</text>
      <text x="140" y="178" font-family="monospace" font-size="9" fill="#00e5ff" text-anchor="end" opacity="0.7">0x14</text>

      <!-- BSRR -->
      <rect x="0" y="192" width="180" height="28" rx="2" fill="#0d1a30" stroke="#1a4a6a" stroke-width="0.5"/>
      <text x="8" y="210" font-family="monospace" font-size="10" fill="#6a9ab8">BSRR</text>
      <text x="140" y="210" font-family="monospace" font-size="9" fill="#4a7a9a" text-anchor="end">0x18</text>

      <!-- LCKR -->
      <rect x="0" y="224" width="180" height="28" rx="2" fill="#0d1a30" stroke="#1a4a6a" stroke-width="0.5"/>
      <text x="8" y="242" font-family="monospace" font-size="10" fill="#6a9ab8">LCKR</text>
      <text x="140" y="242" font-family="monospace" font-size="9" fill="#4a7a9a" text-anchor="end">0x1C</text>

      <!-- AFRL -->
      <rect x="0" y="256" width="180" height="28" rx="2" fill="#0d1a30" stroke="#1a4a6a" stroke-width="0.5"/>
      <text x="8" y="274" font-family="monospace" font-size="10" fill="#6a9ab8">AFRL</text>
      <text x="140" y="274" font-family="monospace" font-size="9" fill="#4a7a9a" text-anchor="end">0x20</text>

      <!-- AFRH -->
      <rect x="0" y="288" width="180" height="28" rx="2" fill="#0d1a30" stroke="#1a4a6a" stroke-width="0.5"/>
      <text x="8" y="306" font-family="monospace" font-size="10" fill="#6a9ab8">AFRH</text>
      <text x="140" y="306" font-family="monospace" font-size="9" fill="#4a7a9a" text-anchor="end">0x24</text>
    </g>

    <!-- Address arrow on right side -->
    <line x1="190" y1="37" x2="190" y2="321" stroke="#1a4a6a" stroke-width="1" stroke-dasharray="3,3"/>
    <text x="195" y="65" font-family="monospace" font-size="7" fill="#2a5a7a">+0x00</text>
    <text x="195" y="185" font-family="monospace" font-size="7" fill="#2a5a7a">+0x14</text>
    <text x="195" y="315" font-family="monospace" font-size="7" fill="#2a5a7a">+0x24</text>
  </g>

  <!-- Pointer cast visualization -->
  <g transform="translate(620, 155)">
    <!-- Cast arrow -->
    <path d="M 0 20 L 40 20" stroke="#00e5ff" stroke-width="1.5" stroke-dasharray="4,2" filter="url(#glow)" opacity="0.6"/>
    <polygon points="40,15 50,20 40,25" fill="#00e5ff" opacity="0.6"/>

    <!-- Code snippet -->
    <rect x="55" y="0" width="300" height="75" rx="4" fill="#0a1220" stroke="#1a3a5a" stroke-width="1" opacity="0.9"/>
    <text x="70" y="20" font-family="monospace" font-size="10" fill="#6a9ab8">#define GPIOA_BASE</text>
    <text x="250" y="20" font-family="monospace" font-size="10" fill="#00e5ff">0x40020000</text>
    <text x="70" y="38" font-family="monospace" font-size="10" fill="#6a9ab8">#define GPIOA</text>
    <text x="70" y="56" font-family="monospace" font-size="10" fill="#4a8aaa">  ((GPIO_TypeDef*)</text>
    <text x="70" y="68" font-family="monospace" font-size="10" fill="#00e5ff">    GPIOA_BASE</text>
    <text x="175" y="68" font-family="monospace" font-size="10" fill="#4a8aaa">)</text>
  </g>

  <!-- Memory address space visualization -->
  <g transform="translate(630, 270)">
    <rect x="0" y="0" width="280" height="160" rx="4" fill="#0a1220" stroke="#1a3a5a" stroke-width="1" opacity="0.8"/>
    <text x="10" y="18" font-family="monospace" font-size="9" fill="#4a7a9a">MEMORY MAP</text>

    <!-- Address blocks -->
    <rect x="10" y="28" width="260" height="22" rx="2" fill="#0d1a30" stroke="#1a3a5a" stroke-width="0.5"/>
    <text x="15" y="43" font-family="monospace" font-size="8" fill="#3a6a8a">...</text>

    <rect x="10" y="54" width="260" height="22" rx="2" fill="url(#regHighlight)" stroke="#00e5ff" stroke-width="0.5" opacity="0.6"/>
    <text x="15" y="69" font-family="monospace" font-size="8" fill="#00e5ff">0x40020000  GPIOA Base</text>

    <rect x="10" y="80" width="260" height="22" rx="2" fill="#0d1a30" stroke="#1a3a5a" stroke-width="0.5"/>
    <text x="15" y="95" font-family="monospace" font-size="8" fill="#4a7a9a">0x40020400  GPIOB Base</text>

    <rect x="10" y="106" width="260" height="22" rx="2" fill="url(#regHighlight)" stroke="#0077b6" stroke-width="0.5" opacity="0.4"/>
    <text x="15" y="121" font-family="monospace" font-size="8" fill="#0077b6">0x40023800  RCC Base</text>

    <rect x="10" y="132" width="260" height="22" rx="2" fill="#0d1a30" stroke="#1a3a5a" stroke-width="0.5"/>
    <text x="15" y="147" font-family="monospace" font-size="8" fill="#3a6a8a">...</text>
  </g>

  <!-- Decorative circuit elements -->
  <g stroke="#1a3a5a" stroke-width="1" fill="none" opacity="0.4">
    <path d="M 950 100 L 980 100 L 1000 120 L 1000 160"/>
    <path d="M 950 500 L 980 500 L 1000 480 L 1000 440"/>
    <path d="M 1100 200 L 1120 200 L 1140 220 L 1140 300"/>
    <path d="M 1100 400 L 1120 400 L 1140 380 L 1140 330"/>
  </g>

  <!-- Decorative dots at trace endpoints -->
  <g fill="#2a5a7a" opacity="0.6">
    <circle cx="1000" cy="160" r="3"/>
    <circle cx="1000" cy="440" r="3"/>
    <circle cx="1140" cy="300" r="3"/>
    <circle cx="1140" cy="330" r="3"/>
    <circle cx="950" cy="100" r="3"/>
    <circle cx="950" cy="500" r="3"/>
    <circle cx="1100" cy="200" r="3"/>
    <circle cx="1100" cy="400" r="3"/>
  </g>

  <!-- Horizontal accent line -->
  <rect x="0" y="570" width="1200" height="1" fill="url(#glowLine)" opacity="0.3"/>

  <!-- Title area -->
  <g transform="translate(370, 480)">
    <text x="0" y="0" font-family="system-ui, sans-serif" font-size="42" font-weight="800" fill="#e8edf5" letter-spacing="-1">Understanding ARM CMSIS</text>
    <text x="0" y="35" font-family="system-ui, sans-serif" font-size="22" font-weight="300" fill="#6a9ab8" letter-spacing="2">MEMORY-MAPPED HARDWARE</text>
  </g>

  <!-- Category tags -->
  <g transform="translate(370, 545)">
    <rect x="0" y="0" width="80" height="22" rx="4" fill="#0d1a30" stroke="#1a4a6a" stroke-width="0.8"/>
    <text x="40" y="15" font-family="system-ui, sans-serif" font-size="9" fill="#4a8aaa" text-anchor="middle">embedded</text>

    <rect x="90" y="0" width="60" height="22" rx="4" fill="#0d1a30" stroke="#1a4a6a" stroke-width="0.8"/>
    <text x="120" y="15" font-family="system-ui, sans-serif" font-size="9" fill="#4a8aaa" text-anchor="middle">stm32</text>

    <rect x="160" y="0" width="58" height="22" rx="4" fill="#0d1a30" stroke="#00e5ff" stroke-width="0.8" opacity="0.7"/>
    <text x="189" y="15" font-family="system-ui, sans-serif" font-size="9" fill="#00e5ff" text-anchor="middle" opacity="0.8">cmsis</text>
  </g>

  <!-- Bit visualization on ODR register -->
  <g transform="translate(630, 445)">
    <text x="0" y="0" font-family="monospace" font-size="8" fill="#4a7a9a">GPIOA-&gt;ODR ^= LED_PIN</text>
    <g transform="translate(0, 8)">
      <rect x="0" y="0" width="14" height="10" rx="1" fill="#0d1a30" stroke="#1a3a5a" stroke-width="0.5"/>
      <rect x="16" y="0" width="14" height="10" rx="1" fill="#0d1a30" stroke="#1a3a5a" stroke-width="0.5"/>
      <rect x="32" y="0" width="14" height="10" rx="1" fill="#0d1a30" stroke="#1a3a5a" stroke-width="0.5"/>
      <rect x="48" y="0" width="14" height="10" rx="1" fill="#0d1a30" stroke="#1a3a5a" stroke-width="0.5"/>
      <rect x="64" y="0" width="14" height="10" rx="1" fill="#0d1a30" stroke="#1a3a5a" stroke-width="0.5"/>
      <rect x="80" y="0" width="14" height="10" rx="1" fill="url(#regHighlight)" stroke="#00e5ff" stroke-width="0.8"/>
      <rect x="96" y="0" width="14" height="10" rx="1" fill="#0d1a30" stroke="#1a3a5a" stroke-width="0.5"/>
      <text x="83" y="8" font-family="monospace" font-size="6" fill="#00e5ff" text-anchor="middle">5</text>
    </g>
    <text x="120" y="16" font-family="monospace" font-size="7" fill="#2a5a7a">PA5 toggle</text>
  </g>

  <!-- Subtle corner accents -->
  <g stroke="#00e5ff" stroke-width="1" opacity="0.15">
    <polyline points="20,20 20,50" fill="none"/>
    <polyline points="20,20 50,20" fill="none"/>
    <polyline points="1180,610 1180,580" fill="none"/>
    <polyline points="1180,610 1150,610" fill="none"/>
  </g>
</svg>